components:
    securitySchemes:
        Bearer Auth:
            bearerFormat: JWT
            description: Required for protected endpoints. Use the Bearer token obtained after authentication.
            scheme: bearer
            type: http
info:
    description: |
        # Documentation for Open Nirmata APIs
        **Open Nirmata** is an agent creation platform.


        ![Open Nirmata Logo](/open-nirmata.png)
    title: Open Nirmata APIs
    version: 1.0.0
openapi: 3.0.3
paths:
    /agents:
        get:
            description: List chat agents with optional enabled and search filters.
            parameters:
                - description: Filter by enabled status
                  in: query
                  name: enabled
                - description: Search by name or description
                  in: query
                  name: q
            responses:
                default:
                    content:
                        application/json:
                            schema:
                                properties:
                                    count:
                                        type: integer
                                    data:
                                        items:
                                            properties:
                                                created_at:
                                                    format: date-time
                                                    nullable: true
                                                    type: string
                                                description:
                                                    type: string
                                                enabled:
                                                    type: boolean
                                                id:
                                                    type: string
                                                name:
                                                    type: string
                                                prompt_flow_id:
                                                    type: string
                                                type:
                                                    type: string
                                                updated_at:
                                                    format: date-time
                                                    nullable: true
                                                    type: string
                                            type: object
                                        type: array
                                    success:
                                        type: boolean
                                type: object
                    description: Agents fetched successfully
            summary: List Agents
            tags:
                - agents
        post:
            description: Create a chat agent that references a prompt flow. This endpoint stores the agent configuration only; agent execution APIs are implemented separately.
            requestBody:
                content:
                    application/json:
                        schema:
                            properties:
                                description:
                                    type: string
                                enabled:
                                    nullable: true
                                    type: boolean
                                name:
                                    type: string
                                prompt_flow_id:
                                    type: string
                                type:
                                    type: string
                            type: object
                description: Agent details
            responses:
                default:
                    content:
                        application/json:
                            schema:
                                properties:
                                    data:
                                        nullable: true
                                        properties:
                                            created_at:
                                                format: date-time
                                                nullable: true
                                                type: string
                                            description:
                                                type: string
                                            enabled:
                                                type: boolean
                                            id:
                                                type: string
                                            name:
                                                type: string
                                            prompt_flow_id:
                                                type: string
                                            type:
                                                type: string
                                            updated_at:
                                                format: date-time
                                                nullable: true
                                                type: string
                                        type: object
                                    message:
                                        type: string
                                    success:
                                        type: boolean
                                    warnings:
                                        items:
                                            type: string
                                        type: array
                                type: object
                    description: Agent created successfully
            summary: Create Agent
            tags:
                - agents
    /agents/{id}:
        delete:
            description: Delete a saved agent by ID.
            parameters:
                - description: Agent ID
                  in: path
                  name: id
                  required: true
            responses:
                default:
                    content:
                        application/json:
                            schema:
                                properties:
                                    data:
                                        nullable: true
                                        properties:
                                            created_at:
                                                format: date-time
                                                nullable: true
                                                type: string
                                            description:
                                                type: string
                                            enabled:
                                                type: boolean
                                            id:
                                                type: string
                                            name:
                                                type: string
                                            prompt_flow_id:
                                                type: string
                                            type:
                                                type: string
                                            updated_at:
                                                format: date-time
                                                nullable: true
                                                type: string
                                        type: object
                                    message:
                                        type: string
                                    success:
                                        type: boolean
                                    warnings:
                                        items:
                                            type: string
                                        type: array
                                type: object
                    description: Agent deleted successfully
            summary: Delete Agent
            tags:
                - agents
        get:
            description: Fetch a single agent by ID.
            parameters:
                - description: Agent ID
                  in: path
                  name: id
                  required: true
            responses:
                default:
                    content:
                        application/json:
                            schema:
                                properties:
                                    data:
                                        nullable: true
                                        properties:
                                            created_at:
                                                format: date-time
                                                nullable: true
                                                type: string
                                            description:
                                                type: string
                                            enabled:
                                                type: boolean
                                            id:
                                                type: string
                                            name:
                                                type: string
                                            prompt_flow_id:
                                                type: string
                                            type:
                                                type: string
                                            updated_at:
                                                format: date-time
                                                nullable: true
                                                type: string
                                        type: object
                                    message:
                                        type: string
                                    success:
                                        type: boolean
                                    warnings:
                                        items:
                                            type: string
                                        type: array
                                type: object
                    description: Agent fetched successfully
            summary: Get Agent
            tags:
                - agents
        put:
            description: Update a saved agent by ID.
            parameters:
                - description: Agent ID
                  in: path
                  name: id
                  required: true
            requestBody:
                content:
                    application/json:
                        schema:
                            properties:
                                description:
                                    nullable: true
                                    type: string
                                enabled:
                                    nullable: true
                                    type: boolean
                                name:
                                    nullable: true
                                    type: string
                                prompt_flow_id:
                                    nullable: true
                                    type: string
                                type:
                                    nullable: true
                                    type: string
                            type: object
                description: Agent fields to update
            responses:
                default:
                    content:
                        application/json:
                            schema:
                                properties:
                                    data:
                                        nullable: true
                                        properties:
                                            created_at:
                                                format: date-time
                                                nullable: true
                                                type: string
                                            description:
                                                type: string
                                            enabled:
                                                type: boolean
                                            id:
                                                type: string
                                            name:
                                                type: string
                                            prompt_flow_id:
                                                type: string
                                            type:
                                                type: string
                                            updated_at:
                                                format: date-time
                                                nullable: true
                                                type: string
                                        type: object
                                    message:
                                        type: string
                                    success:
                                        type: boolean
                                    warnings:
                                        items:
                                            type: string
                                        type: array
                                type: object
                    description: Agent updated successfully
            summary: Update Agent
            tags:
                - agents
    /agents/{id}/execute:
        post:
            description: 'Execute an agent using its prompt flow. Supports three modes: synchronous (default), asynchronous (?async=true), and server-sent events streaming (?stream=true). The execution traverses the prompt flow stages (chat, tool, retrieval, router) and records comprehensive execution history including LLM interactions, tool calls, and stage transitions.'
            parameters:
                - description: Agent ID
                  in: path
                  name: id
                  required: true
                - description: Execute asynchronously and return job ID
                  in: query
                  name: async
                - description: Stream execution events via Server-Sent Events
                  in: query
                  name: stream
            requestBody:
                content:
                    application/json:
                        schema:
                            properties:
                                message:
                                    type: string
                                messages:
                                    items:
                                        properties:
                                            content:
                                                type: string
                                            name:
                                                type: string
                                            role:
                                                type: string
                                            tool_call_id:
                                                type: string
                                            tool_calls:
                                                items:
                                                    properties:
                                                        arguments:
                                                            additionalProperties: {}
                                                            type: object
                                                        id:
                                                            type: string
                                                        tool_name:
                                                            type: string
                                                    type: object
                                                type: array
                                        type: object
                                    type: array
                                metadata:
                                    additionalProperties: {}
                                    type: object
                                stream:
                                    type: boolean
                            type: object
                description: Execution request with user message(s)
            responses:
                default:
                    content:
                        application/json:
                            schema:
                                properties:
                                    data:
                                        nullable: true
                                        properties:
                                            agent_id:
                                                type: string
                                            completed_at:
                                                format: date-time
                                                nullable: true
                                                type: string
                                            created_at:
                                                format: date-time
                                                nullable: true
                                                type: string
                                            error:
                                                type: string
                                            final_output:
                                                type: string
                                            id:
                                                type: string
                                            input:
                                                additionalProperties: {}
                                                type: object
                                            metadata:
                                                additionalProperties: {}
                                                type: object
                                            prompt_flow_id:
                                                type: string
                                            status:
                                                type: string
                                            steps:
                                                items:
                                                    properties:
                                                        completed_at:
                                                            format: date-time
                                                            nullable: true
                                                            type: string
                                                        error:
                                                            type: string
                                                        id:
                                                            type: string
                                                        input_messages:
                                                            items:
                                                                properties:
                                                                    content:
                                                                        type: string
                                                                    name:
                                                                        type: string
                                                                    role:
                                                                        type: string
                                                                    tool_call_id:
                                                                        type: string
                                                                    tool_calls:
                                                                        items:
                                                                            properties:
                                                                                arguments:
                                                                                    additionalProperties: {}
                                                                                    type: object
                                                                                id:
                                                                                    type: string
                                                                                tool_name:
                                                                                    type: string
                                                                            type: object
                                                                        type: array
                                                                type: object
                                                            type: array
                                                        llm_calls:
                                                            items:
                                                                properties:
                                                                    completion_tokens:
                                                                        type: integer
                                                                    finish_reason:
                                                                        type: string
                                                                    latency_ms:
                                                                        format: int64
                                                                        type: integer
                                                                    max_tokens:
                                                                        nullable: true
                                                                        type: integer
                                                                    model:
                                                                        type: string
                                                                    prompt_tokens:
                                                                        type: integer
                                                                    provider:
                                                                        type: string
                                                                    provider_id:
                                                                        type: string
                                                                    temperature:
                                                                        format: double
                                                                        nullable: true
                                                                        type: number
                                                                    total_tokens:
                                                                        type: integer
                                                                type: object
                                                            type: array
                                                        metadata:
                                                            additionalProperties: {}
                                                            type: object
                                                        next_stage_id:
                                                            type: string
                                                        output_message:
                                                            nullable: true
                                                            properties:
                                                                content:
                                                                    type: string
                                                                name:
                                                                    type: string
                                                                role:
                                                                    type: string
                                                                tool_call_id:
                                                                    type: string
                                                                tool_calls:
                                                                    items:
                                                                        properties:
                                                                            arguments:
                                                                                additionalProperties: {}
                                                                                type: object
                                                                            id:
                                                                                type: string
                                                                            tool_name:
                                                                                type: string
                                                                        type: object
                                                                    type: array
                                                            type: object
                                                        retrieved_context:
                                                            items:
                                                                type: string
                                                            type: array
                                                        stage_id:
                                                            type: string
                                                        stage_name:
                                                            type: string
                                                        stage_type:
                                                            type: string
                                                        started_at:
                                                            format: date-time
                                                            nullable: true
                                                            type: string
                                                        status:
                                                            type: string
                                                        tool_calls:
                                                            items:
                                                                properties:
                                                                    arguments:
                                                                        additionalProperties: {}
                                                                        type: object
                                                                    completed_at:
                                                                        format: date-time
                                                                        nullable: true
                                                                        type: string
                                                                    error:
                                                                        type: string
                                                                    id:
                                                                        type: string
                                                                    latency_ms:
                                                                        format: int64
                                                                        type: integer
                                                                    result:
                                                                        type: string
                                                                    started_at:
                                                                        format: date-time
                                                                        nullable: true
                                                                        type: string
                                                                    tool_id:
                                                                        type: string
                                                                    tool_name:
                                                                        type: string
                                                                    tool_type:
                                                                        type: string
                                                                type: object
                                                            type: array
                                                        transition_reason:
                                                            type: string
                                                    type: object
                                                type: array
                                            total_latency_ms:
                                                format: int64
                                                type: integer
                                            updated_at:
                                                format: date-time
                                                nullable: true
                                                type: string
                                        type: object
                                    job_id:
                                        type: string
                                    message:
                                        type: string
                                    success:
                                        type: boolean
                                type: object
                    description: Execution result (data for sync, job_id for async, SSE events for streaming)
            summary: Execute Agent
            tags:
                - agents
