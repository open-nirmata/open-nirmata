                                            index_name:
                                                type: string
                                            name:
                                                type: string
                                            namespace:
                                                type: string
                                            provider:
                                                type: string
                                            updated_at:
                                                format: date-time
                                                nullable: true
                                                type: string
                                        type: object
                                    message:
                                        type: string
                                    success:
                                        type: boolean
                                type: object
