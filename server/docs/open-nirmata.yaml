components:
    securitySchemes:
        Bearer Auth:
            bearerFormat: JWT
            description: Required for protected endpoints. Use the Bearer token obtained after authentication.
            scheme: bearer
            type: http
info:
    description: |
        # Documentation for Open Nirmata APIs
        **Open Nirmata** is an agent creation platform.


        ![Open Nirmata Logo](/open-nirmata.png)
    title: Open Nirmata APIs
    version: 1.0.0
openapi: 3.0.3
paths:
    /health:
        get:
            description: Health Check
            responses:
                default:
                    content:
                        application/json:
                            schema:
                                properties:
                                    success:
                                        type: boolean
                                    version:
                                        type: string
                                type: object
                    description: Ingestion is successful
            summary: Health Check
            tags:
                - health
    /knowledgebases:
        get:
            description: List configured knowledgebase providers with optional provider, enabled, and search filters.
            parameters:
                - description: Filter by provider (milvus, mixedbread, zeroentropy, algolia, qdrant)
                  in: query
                  name: provider
                - description: Filter by enabled status
                  in: query
                  name: enabled
                - description: Search by name, description, index, namespace, or embedding model
                  in: query
                  name: q
            responses:
                default:
                    content:
                        application/json:
                            schema:
                                properties:
                                    count:
                                        type: integer
                                    data:
                                        items:
                                            properties:
                                                auth_configured:
                                                    type: boolean
                                                base_url:
                                                    type: string
                                                config:
                                                    additionalProperties: {}
                                                    type: object
                                                created_at:
                                                    format: date-time
                                                    nullable: true
                                                    type: string
                                                description:
                                                    type: string
                                                embedding_model:
                                                    type: string
                                                enabled:
                                                    type: boolean
                                                id:
                                                    type: string
                                                index_name:
                                                    type: string
                                                name:
                                                    type: string
                                                namespace:
                                                    type: string
                                                provider:
                                                    type: string
                                                updated_at:
                                                    format: date-time
                                                    nullable: true
                                                    type: string
                                            type: object
                                        type: array
                                    success:
                                        type: boolean
                                type: object
                    description: Knowledgebases fetched successfully
            summary: List Knowledgebases
            tags:
                - knowledgebases
        post:
            description: Create a saved knowledgebase configuration for Milvus, Mixedbread, ZeroEntropy, Algolia, or Qdrant. Shilp can be added later.
            requestBody:
                content:
                    application/json:
                        schema:
                            properties:
                                api_key:
                                    type: string
                                auth:
                                    additionalProperties: {}
                                    type: object
                                base_url:
                                    type: string
                                config:
                                    additionalProperties: {}
                                    type: object
                                description:
                                    type: string
                                embedding_model:
                                    type: string
                                enabled:
                                    nullable: true
                                    type: boolean
                                index_name:
                                    type: string
                                name:
                                    type: string
                                namespace:
                                    type: string
                                provider:
                                    type: string
